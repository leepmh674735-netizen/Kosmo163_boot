<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>이벤트 전파 및 제어 테스트</title>
    <style>
        #id1 { padding: 20px; background-color: #f0f0f0; border: 1px solid #ccc; margin-bottom: 10px; }
        #id1_sub { padding: 10px; background-color: #ffcc00; cursor: pointer; }
        #id2 { display: inline-block; margin-top: 10px; color: blue; text-decoration: underline; cursor: pointer; }
        .controls { margin-bottom: 20px; padding: 10px; border-bottom: 2px solid #333; }
    </style>
</head>
<body>

    <div class="controls">
        <form id="frm">
            <button type="button" id="btn">btn: id1 마우스 엔터 트리거</button>
        </form>
        <a href="https://www.naver.com" id="id2">Naver 링크 (id2)</a>
    </div>

    <div id="id1">
        부모 요소 (id1)
        <div id="id1_sub">자식 요소 (id1_sub) - 클릭 시 버블링 중단</div>
    </div>

    <script>
        const btn = document.getElementById("btn");
        const frm = document.getElementById("frm");
        const id1 = document.getElementById("id1");
        const id2 = document.getElementById("id2");
        // id1_sub가 id1 내부에 있다고 가정하고 선택자를 추가했습니다.
        const id1_sub = document.getElementById("id1_sub");

        // id2: 기본 이동 막고 콘솔 출력
        id2.addEventListener("click", function(e) {
            e.preventDefault();
            console.log("naver");
        });

        // btn: id1의 onmouseenter 이벤트를 강제로 실행 (함수가 정의되어 있어야 함)
        btn.addEventListener("click", function(e) {
            console.log("버튼 클릭됨", e);
            e.preventDefault();
            
            // id1.onmouseenter가 정의되어 있다면 실행
            if (typeof id1.onmouseenter === "function") {
                id1.onmouseenter();
            } else {
                console.log("id1에 정의된 onmouseenter가 없습니다.");
            }
        });

        // id1 (부모): 클릭 시 콘솔 출력
        id1.addEventListener("click", function() {
            console.log("parent");
        });

        // id1_sub (자식): 클릭 시 상위(id1)로 이벤트가 퍼지는 것을 막음
        id1_sub.addEventListener("click", function(e) {
            console.log("child");
            e.stopPropagation(); // 부모(id1)의 클릭 이벤트 발생을 방지
        });

        // btn에서 호출하기 위한 임시 마우스 엔터 함수 정의
        id1.onmouseenter = function() {
            console.log("id1에 마우스가 들어왔습니다! (Triggered)");
        };
    </script>
</body>
</html>
